<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
</head>

<body>

<center>

    <div style="width:300px; border:1px solid #ddd; padding:20px; margin-top:60px; border-radius:8px;">

        <h2>Create Account</h2>

        <form>

            <label><b>Full Name</b></label><br>
            <input type="text" placeholder="Your name" style="width:100%; height:30px;"><br><br>

            <label><b>Email Address</b></label><br>
            <input type="email" placeholder="you@example.com" style="width:100%; height:30px;"><br><br>

            <label><b>Password</b></label><br>
            <input type="password" placeholder="Enter password" style="width:100%; height:30px;"><br><br>

            <label><b>Confirm Password</b></label><br>
            <input type="password" placeholder="Confirm password" style="width:100%; height:30px;"><br><br>

            <input type="submit" value="Sign Up"
            style="width:100%; height:35px; background:limegreen; color:white; border:none; border-radius:5px;">

        </form>

        <br>

        <p>
            Already have an account?
            <a href="#">Login Here</a>
        </p>

    </div>

</center>

</body>
</html>
